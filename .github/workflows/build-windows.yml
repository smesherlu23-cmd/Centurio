name: Build Windows installer

# Builds the Flet Windows app and packages it into an installer.
# Run manually (Actions -> Build Windows installer -> Run) or on a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flet CLI
        run: pip install "flet[all]==0.28.3"

      - name: Generate icons
        run: python -m app.iconify

      - name: Build Windows app
        run: flet build windows -v

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\centurio.iss'

      - name: Upload app (folder)
        uses: actions/upload-artifact@v4
        with:
          name: centurio-windows-app
          path: build/windows

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: centurio-windows-installer
          path: installer/Output/CenturioSetup.exe
