<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; script-src 'self';" />
  <title>Centurio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-frame" aria-busy="true"></div>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <!-- Toast host -->
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <!-- demo-data.js provides a fallback dataset + mock bridge for running in a plain
       browser (no Electron). It is a no-op when window.centurio is present. -->
  <script src="demo-data.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
